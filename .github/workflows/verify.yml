name: verify

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Dataverificatie (invarianten, hashketen, connectorreferenties)
        run: node scripts/verify-data.mjs --export /tmp/bn-data

      - name: Schemavalidatie (JSON Schema draft 2020-12)
        run: |
          pip install --quiet jsonschema
          python3 scripts/validate-schemas.py /tmp/bn-data

      - name: Pagina-checks (inline-JS-syntax, interne links)
        run: python3 scripts/check-pages.py

      - name: Renderchecks (headless Chrome, inhoud + console-errors)
        run: python3 scripts/render-check.py
